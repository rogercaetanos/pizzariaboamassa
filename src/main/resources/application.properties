spring.application.name=pizzariaboamassa

# SQL Server Configuration

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=pizzaria_boamassadb;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=@ITB123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA Configuration

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# Informaçőes

# spring.jpa.hibernate.ddl-auto=
# none:   Banco de dados e tabelas devem ser criados com antecedęncia
# update: Banco de dados deve ser criado com antecedęncia, tabelas podem ser criadas com antecedęncia, as tabelas
#         serăo atualizadas pelo model toda a vez que o mesmo for alterado
# create-drop: Banco de dados deve ser criado com antecedęncia, as tabelas serăo criadas automaticamente pelo model,
#         entretanto, as tabelas serăo excluídas toda a vez que o servidor for "desligado" (interrompido)
# create: Banco de dados deve ser criado com antecedęncia, quando o servidor carrega, as tabelas serăo recriadas,
#         entretanto, quando o servidor é interrompido as tabelas permanecem

